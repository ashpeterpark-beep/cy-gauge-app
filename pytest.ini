[pytest]
testpaths     = tests
addopts       = -v --tb=short --strict-markers
filterwarnings =
    ignore::DeprecationWarning
    ignore::scipy.sparse.SparseEfficiencyWarning

markers =
    slow: marks tests that run the full Dolbeault Laplacian solver (deselect with -m "not slow")
    unit: pure unit tests with no HTTP layer
    integration: tests that exercise the full FastAPI endpoints
