name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "main.py"
      - "requirements.txt"
      - "Dockerfile"
      - ".github/workflows/backend.yml"
  pull_request:
    branches: [main]
    paths:
      - "main.py"
      - "requirements.txt"
      - "Dockerfile"
      - ".github/workflows/backend.yml"

jobs:
  test:
    name: Lint & Test (Python)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black pytest httpx

      - name: Check formatting (black)
        run: black --check main.py

      - name: Run health-check test
        run: |
          uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 3
          python - <<'EOF'
          import httpx, sys
          r = httpx.get("http://localhost:8000/api/health")
          assert r.status_code == 200, f"Health check failed: {r.status_code}"
          print("Health check passed:", r.json())
          EOF

      - name: Run /api/run smoke test
        run: |
          python - <<'EOF'
          import httpx, sys
          payload = {"nx": 2, "ny": 2, "nz": 2, "nw": 2, "N": 2,
                     "scale": 0.05, "h2": 0.01, "seed": 0, "n_eigs": 4}
          r = httpx.post("http://localhost:8000/api/run", json=payload, timeout=60)
          assert r.status_code == 200, f"/api/run failed: {r.text}"
          data = r.json()
          assert "curv_norms" in data
          assert "dolbeault_eigenvalues" in data
          print("Simulation smoke test passed. Slopes:", data["slopes"])
          EOF

      - name: Run /api/sweep smoke test
        run: |
          python - <<'EOF'
          import httpx
          payload = {"nx": 2, "ny": 2, "nz": 2, "nw": 2, "N": 2,
                     "scale": 0.05, "h2": 0.01, "mu1": 0.5, "mu2": -0.3,
                     "seed": 0, "steps": 4}
          r = httpx.post("http://localhost:8000/api/sweep", json=payload, timeout=60)
          assert r.status_code == 200, f"/api/sweep failed: {r.text}"
          data = r.json()
          assert "sweep" in data and len(data["sweep"]) == 4
          print("Sweep smoke test passed. Steps:", len(data["sweep"]))
          EOF

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: cy-gauge-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
